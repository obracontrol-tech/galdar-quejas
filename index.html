<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1A3A6B">
  <meta name="description" content="Panel de gestión de quejas — José Blas Díaz Bolaños">
  <title>Panel Concejal · Gáldar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
  <img src="logo.png" alt="Unidos por Gran Canaria">
  <p>Cargando panel...</p>
</div>

<div id="app" class="hidden">

  <header>
    <div class="header-logo-bar">
      <img src="logo.png" class="logo-img" alt="Unidos por Gran Canaria">
      <div class="header-concejal">
        <div class="header-name">José Blas Díaz Bolaños</div>
        <div class="header-role">Panel de Gestión · Gáldar</div>
      </div>
    </div>
    <div class="header-bottom">
      <div class="header-title">Panel Concejal</div>
      <div class="header-sub">Gestión de quejas vecinales</div>
    </div>
  </header>

  <div class="contenido">

    <!-- LOGIN -->
    <div id="login-box">
      <div class="login-logo">
        <img src="logo.png" alt="Unidos por Gran Canaria">
      </div>
      <h2>Acceso privado</h2>
      <p>Área exclusiva del Concejal</p>
      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="pin-input" placeholder="Introduce la contraseña" onkeydown="if(event.key==='Enter') verificarPin()">
      </div>
      <button class="btn-primary" onclick="verificarPin()">Entrar</button>
      <p id="pin-error" class="error hidden">Contraseña incorrecta</p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

      <div class="dashboard-header">
        <span>Quejas recibidas</span>
        <button class="btn-logout" onclick="cerrarSesion()">Salir</button>
      </div>

      <div class="stat-row">
        <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-lbl">Total</div></div>
        <div class="stat-card"><div class="stat-num" id="st-nuevas">0</div><div class="stat-lbl">Nuevas</div></div>
        <div class="stat-card"><div class="stat-num" id="st-pleno">0</div><div class="stat-lbl">Para pleno</div></div>
        <div class="stat-card"><div class="stat-num" id="st-resueltas">0</div><div class="stat-lbl">Resueltas</div></div>
      </div>

      <div class="filtros">
        <button class="filtro active" onclick="filtrar('todas',this)">Todas</button>
        <button class="filtro" onclick="filtrar('nueva',this)">Nuevas</button>
        <button class="filtro" onclick="filtrar('pleno',this)">Para pleno</button>
        <button class="filtro" onclick="filtrar('resuelta',this)">Resueltas</button>
      </div>

      <div id="lista-quejas"></div>

    </div>
  </div>
</div>

<!-- MODAL POST -->
<div id="modal-post" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="ia-label">POST FACEBOOK GENERADO</div>
    <p id="modal-post-texto"></p>
    <button class="btn-primary" onclick="copiarPostModal()">Copiar</button>
    <button class="btn-secondary" onclick="document.getElementById('modal-post').classList.add('hidden')">Cerrar</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, updateDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyArK1mSHIHsxObbPxsG8VB7HgFMy2tC-6U",
    authDomain: "galdar-quejas.firebaseapp.com",
    projectId: "galdar-quejas",
    storageBucket: "galdar-quejas.firebasestorage.app",
    messagingSenderId: "260225193649",
    appId: "1:260225193649:web:6ca2c3ef2007685850f490"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const PIN = "galdar2025";

  let quejasCache = [];
  let filtroActual = "todas";

  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }, 1000);
  });

  // ── LOGIN
  window.verificarPin = function() {
    const pin = document.getElementById('pin-input').value;
    if (pin === PIN) {
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('pin-error').classList.add('hidden');
      cargarQuejas();
    } else {
      document.getElementById('pin-error').classList.remove('hidden');
      document.getElementById('pin-input').value = '';
    }
  }

  window.cerrarSesion = function() {
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('login-box').classList.remove('hidden');
    document.getElementById('pin-input').value = '';
  }

  // ── CARGAR QUEJAS EN TIEMPO REAL
  function cargarQuejas() {
    const q = query(collection(db, "quejas"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
      quejasCache = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderPanel();
    });
  }

  function renderPanel() {
    document.getElementById('st-total').textContent = quejasCache.length;
    document.getElementById('st-nuevas').textContent = quejasCache.filter(q=>q.estado==='nueva').length;
    document.getElementById('st-pleno').textContent = quejasCache.filter(q=>q.estado==='pleno').length;
    document.getElementById('st-resueltas').textContent = quejasCache.filter(q=>q.estado==='resuelta').length;

    const filtradas = filtroActual==='todas' ? quejasCache : quejasCache.filter(q=>q.estado===filtroActual);
    const lista = document.getElementById('lista-quejas');

    if (!filtradas.length) {
      lista.innerHTML = '<p class="sin-quejas">No hay quejas en esta categoría</p>';
      return;
    }

    lista.innerHTML = filtradas.map(q => {
      const fecha = q.fecha?.toDate ? q.fecha.toDate().toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'}) : (q.fechaTexto||'');
      return `<div class="queja-card">
        <div class="queja-header">
          <span class="queja-cat">${q.categoria}</span>
          <span class="queja-fecha">${fecha}</span>
        </div>
        <div class="queja-barrio">${q.barrio}</div>
        <div class="queja-texto">${q.descripcion}</div>
        <div class="queja-nombre">${q.nombre||'Anónimo'}</div>
        ${q.foto ? `<img src="${q.foto}" class="queja-foto" alt="Foto incidencia">` : ''}
        <span class="queja-estado estado-${q.estado}">${q.estado==='nueva'?'Nueva':q.estado==='pleno'?'Para pleno':'Resuelta'}</span>
        ${q.estado==='nueva'?`
          <button class="btn-accion" onclick="generarPost('${q.id}','${q.barrio}','${q.categoria}',\`${q.descripcion.replace(/`/g,"'")}\`)">✦ Generar post Facebook</button>
          <button class="btn-accion verde" onclick="cambiarEstado('${q.id}','pleno')">Marcar para pleno</button>`:''}
        ${q.estado==='pleno'?`
          <button class="btn-accion" onclick="generarPost('${q.id}','${q.barrio}','${q.categoria}',\`${q.descripcion.replace(/`/g,"'")}\`)">✦ Generar post Facebook</button>
          <button class="btn-accion verde" onclick="cambiarEstado('${q.id}','resuelta')">Marcar como resuelta</button>`:''}
      </div>`;
    }).join('');
  }

  window.filtrar = function(estado, btn) {
    filtroActual = estado;
    document.querySelectorAll('.filtro').forEach(f=>f.classList.remove('active'));
    btn.classList.add('active');
    renderPanel();
  }

  window.cambiarEstado = async function(id, estado) {
    try { await updateDoc(doc(db,"quejas",id), { estado }); }
    catch(e) { console.error(e); }
  }

  // ── GENERAR POST FACEBOOK CON IA
  window.generarPost = async function(id, barrio, categoria, descripcion) {
    document.getElementById('modal-post-texto').textContent = 'Generando post con IA...';
    document.getElementById('modal-post').classList.remove('hidden');
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:400,
          messages:[{role:'user', content:`Post de Facebook para José Blas Díaz Bolaños, concejal de Unidos por Gran Canaria en Gáldar. Queja vecinal: barrio ${barrio}, ${categoria}: "${descripcion}". Tono cercano y propositivo. 3-4 frases. Termina con #Gáldar #UnidosPorGranCanaria. Solo el texto, sin introducción.`}]
        })
      });
      const data = await res.json();
      document.getElementById('modal-post-texto').textContent = data.content[0].text;
    } catch(e) {
      document.getElementById('modal-post-texto').textContent = 'Error generando el post.';
    }
  }

  window.copiarPostModal = function() {
    const texto = document.getElementById('modal-post-texto').textContent;
    navigator.clipboard.writeText(texto).then(() => {
      alert('¡Copiado! Pégalo en Facebook.');
      document.getElementById('modal-post').classList.add('hidden');
    });
  }
</script>
</body>
</html>
